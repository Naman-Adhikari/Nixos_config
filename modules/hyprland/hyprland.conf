      # █ █▄░█ █▀█ █░█ ▀█▀
      # █ █░▀█ █▀▀ █▄█ ░█░
      input {
        kb_layout = us
        follow_mouse = 1
        sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

        touchpad { # For Laptops
            natural_scroll = false
            middle_button_emulation = true
            tap-to-click = true
        }
      }


      general {
        gaps_in= 5
        gaps_out= 15
        border_size= 1
        resize_on_border = true
        col.active_border = rgba(000000ff) rgba(000000ff) 90deg
        col.inactive_border = rgba(000000aa)
        allow_tearing = false
        layout = scrolling
      }

        scrolling{
            direction = right
        }


      decoration {
          rounding = 24
          active_opacity = 1.0
          inactive_opacity = 0.95

          blur {
              enabled = true
              size = 5
              passes = 3
              vibrancy = 0.1696
            new_optimizations = true
          }
      }

# ─────────────────────────────────────────────
#        Hella Cool & Flashy Animations
# ─────────────────────────────────────────────

animation{
bezier = overshot, 0.13, 0.99, 0.29, 1.1
bezier = mybounce, 0.68, -0.55, 0.265, 1.55
bezier = fastSwoosh, 0.22, 1, 0.36, 1
bezier = expoOut, 0.19, 1, 0.22, 1

animation = global, 0.9

animation = windowsIn, 1, 5, overshot, popin 80%   # popin 80–85% feels crisp & modern

animation = windowsOut, 1, 3, expoOut, popin 80%

animation = windowsMove, 1, 4, fastSwoosh

animation = fade, 1, 6, default


animation = workspaces, 1, 7, mybounce, fade
animation = workspacesIn, 1, 5, linear, fade
 animation = workspacesOut,1, 5, linear, fade

# Special workspace (scratchpads / magic toggles) extra spicy
animation = specialWorkspace, 1, 6, mybounce, slidefadevert 25%
}
    #GESTURES
