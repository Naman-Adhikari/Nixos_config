format = """
[в•ӯ](fg:line)\
$os\
$directory\
$git_branch\
$git_status\
$fill\
$nodejs\
$bun\
$deno\
$aws\
$cmd_duration\
$shell\
$time\
$username\
$line_break\
$character\
"""

palette = 'noctech'
add_newline = true

[palettes.noctech]
box = '#101418'          # muted frame/separators
background = '#1d2024' # neutral background
current_line = '#9fcafc'    # accent line highlight
primary = '#d5bee5'        # main accent for keys
foreground = '#e1e2e8'   # readable text values
gray = '#c2c7cf' # subtle secondary info
highlight = '#9fcafc' # softer accent highlight
dim = '#101418'             # neutral dim tone
subtle = '#003257'       # bright readable overlay

[os]
format = "(fg:current_line)[оӮ¶](fg:gray)[$symbol ](fg:primary bg:gray)[оӮҙ](fg:gray)"
disabled = false
[os.symbols]
NixOS = "пҢ“"

[directory]
format = "[в”Җ](fg:current_line)[оӮ¶](fg:foreground)[ ](fg:primary bg:highlight)[оӮҙ](fg:foreground bg:box)[ $read_only$truncation_symbol$path](fg:foreground bg:box)[оӮҙ](fg:box)"
home_symbol = "оӯҶ ~/"
truncation_symbol = "оҜҹ "
truncation_length = 2
read_only = " "
read_only_style = ""

[git_branch]
format = "[в”Җ](fg:current_line)[оӮ¶](fg:gray)[$symbol](fg:primary bg:gray)[оӮҙ](fg:gray bg:box)[ $branch](fg:foreground bg:box)"

[git_status]
format = "[( $all_status)](fg:foreground bg:box)[оӮҙ](fg:box)"

[nodejs]
format = "[в”Җ](fg:current_line)[оӮ¶](fg:gray)[$symbol](fg:primary bg:gray)[оӮҙ](fg:gray bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)"

[bun]
format = "[в”Җ](fg:current_line)[оӮ¶](fg:gray)[$symbol](fg:primary bg:gray)[оӮҙ](fg:gray bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)"
symbol = "рҹҘҹ"

[deno]
format = "[в”Җ](fg:current_line)[оӮ¶](fg:gray)[$symbol](fg:primary bg:gray)[оӮҙ](fg:gray bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)"
symbol = "рҹҰ•"

[aws]
format = "[в”Җ](fg:current_line)[оӮ¶](fg:gray)[вҳҒпёҸ](fg:primary bg:gray)[оӮҙ](fg:gray bg:box)[ $profile](fg:foreground bg:box)[оӮҙ](fg:box)"
symbol = "вҳҒпёҸ"

[fill]
symbol = "в”Ғ"
style = "fg:current_line"

[cmd_duration]
min_time = 500
format = "[в”Җ](fg:current_line)[оӮ¶](fg:dim)[пғ§ ](fg:primary bg:dim)[оӮҙ](fg:dim bg:box)[ $duration ](fg:foreground bg:box)[оӮҙ](fg:box)"

[shell]
format = "[в”Җ](fg:current_line)[оӮ¶](fg:gray)[п’ү ](fg:primary bg:gray)[оӮҙ](fg:gray bg:box)[ $indicator](fg:foreground bg:box)[оӮҙ](fg:box)"
disabled = true

[time]
format = "[в”Җ](fg:current_line)[оӮ¶](fg:gray)[ ](fg:primary bg:gray)[оӮҙ](fg:gray bg:box)[ $time](fg:foreground bg:box)[оӮҙ](fg:box)"
time_format = "%H:%M"
disabled = false

[username]
format = "[в”Җ](fg:current_line)[оӮ¶](fg:gray)[гҖ ](fg:primary bg:gray)[оӮҙ](fg:gray bg:box)[ $user](fg:foreground bg:box)[оӮҙ](fg:box)"
show_always = true

[character]
format = """
[в”Ӯ](fg:current_line)
[в•°в”Җ$symbol](fg:current_line) """
success_symbol = "[оҠ…оҠ…](fg:#e4e4e4)"
error_symbol = "[оҠ…оҠ…](fg:#ff6666)"
